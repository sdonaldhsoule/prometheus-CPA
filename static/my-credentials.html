<!DOCTYPE html>
<html lang="zh-Hans">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的凭证 - 凭证捐赠站</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎁</text></svg>">
</head>
<body class="page-shell">
    <div class="theme-switcher">
        <div class="theme-btn t-light" onclick="setTheme('light')" title="晨曦微光 (清新)"></div>
        <div class="theme-btn t-ocean" onclick="setTheme('ocean')" title="深海极光"></div>
        <div class="theme-btn t-gold" onclick="setTheme('gold')" title="虚空暗金"></div>
        <div class="theme-btn t-neon" onclick="setTheme('neon')" title="赛博霓虹"></div>
    </div>

    <div class="container container-wide">
        <div class="section-header-row" style="margin-bottom: 1rem;">
            <div style="text-align:left;">
                <span class="auth-kicker">用户中心</span>
                <h1 style="margin-top:6px;">我的凭证</h1>
                <p class="subtitle" style="margin-bottom:0;">查看你在本站上传过的凭证，并从本站列表移除不想继续显示的记录。</p>
            </div>
            <div class="section-actions">
                <button class="btn-secondary compact-btn" onclick="window.location.href='/'">返回上传页</button>
                <button class="btn-secondary compact-btn" onclick="logout()">退出登录</button>
            </div>
        </div>

        <div id="error-box" class="status-msg status-error"></div>
        <div id="success-box" class="status-msg status-success"></div>

        <div class="user-banner" style="margin-bottom: 1.25rem;">
            <div>
                <span class="auth-kicker">当前账号</span>
                <div class="auth-title" id="currentUserName">-</div>
                <span class="helper-note" id="currentUserMeta">-</span>
            </div>
            <div>
                <span class="mini-label">仅展示未移除记录</span>
            </div>
        </div>

        <div class="warning-box" style="margin-top: 0; margin-bottom: 1.25rem;">
            <strong>本地移除说明</strong>
            <p>点击“从本站列表移除”后，这条凭证会从你的用户列表里隐藏，但不会删除 CPA 远端真实凭证，也不会影响后台历史记录。</p>
        </div>

        <div class="section-card">
            <div class="section-header-row" style="margin-bottom: 1rem;">
                <div>
                    <div class="section-title">凭证列表</div>
                    <span class="helper-note" id="credentialSummary">正在加载...</span>
                </div>
                <div class="section-actions">
                    <button class="btn-secondary compact-btn" onclick="loadCredentials(true)">刷新</button>
                </div>
            </div>

            <div id="credentialsContainer" class="credentials-grid"></div>

            <div class="pagination-bar">
                <span class="pagination-info" id="paginationInfo">-</span>
                <div class="section-actions">
                    <button class="btn-secondary compact-btn" id="prevBtn" onclick="changePage(-1)">上一页</button>
                    <button class="btn-secondary compact-btn" id="nextBtn" onclick="changePage(1)">下一页</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const pageSize = 10;
        let currentPage = 0;
        let totalCredentials = 0;
        let currentUser = null;

        function setTheme(theme) {
            document.body.removeAttribute('data-theme');
            if (theme !== 'ocean') document.body.setAttribute('data-theme', theme);
            document.querySelectorAll('.theme-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelector(`.t-${theme}`).classList.add('active');
            localStorage.setItem('site-theme', theme);
        }

        function showMessage(type, text) {
            const successBox = document.getElementById('success-box');
            const errorBox = document.getElementById('error-box');
            successBox.style.display = 'none';
            errorBox.style.display = 'none';

            if (!text) return;

            if (type === 'success') {
                successBox.textContent = text;
                successBox.style.display = 'block';
            } else {
                errorBox.textContent = text;
                errorBox.style.display = 'block';
            }
        }

        function formatDate(value) {
            if (!value) return '-';
            return new Date(value).toLocaleString('zh-CN');
        }

        function statusLabel(status) {
            const map = {
                verified: '已验证',
                pending: '待处理',
                invalid: '无效',
                used: '已使用'
            };
            return map[status] || status || '-';
        }

        function statusClass(status) {
            if (status === 'verified') return 'success';
            if (status === 'pending') return 'warning';
            if (status === 'invalid') return 'error';
            return 'info';
        }

        async function loadCurrentUser() {
            const response = await fetch('/api/user/me');
            if (!response.ok) {
                window.location.href = '/';
                throw new Error('未登录');
            }

            currentUser = await response.json();
            document.getElementById('currentUserName').textContent = currentUser.display_name || currentUser.username;
            document.getElementById('currentUserMeta').textContent = currentUser.email || `NewAPI 用户 #${currentUser.newapi_user_id}`;
        }

        async function loadCredentials(resetPage = false) {
            if (resetPage) currentPage = 0;

            try {
                const response = await fetch(`/api/user/credentials?limit=${pageSize}&offset=${currentPage * pageSize}`);
                if (response.status === 401) {
                    window.location.href = '/';
                    return;
                }

                const result = await response.json();
                if (!response.ok) {
                    throw new Error(result.error || '读取凭证失败');
                }

                totalCredentials = result.total || 0;
                renderCredentials(result.data || []);
                updatePagination();
            } catch (error) {
                showMessage('error', error.message || '读取凭证失败');
            }
        }

        function renderCredentials(credentials) {
            const container = document.getElementById('credentialsContainer');
            const summary = document.getElementById('credentialSummary');

            if (!credentials.length) {
                container.innerHTML = `
                    <div class="empty-panel">
                        <div style="font-size:2rem; margin-bottom: 10px;">📭</div>
                        <div>你还没有可显示的凭证记录</div>
                        <div class="helper-note" style="margin-top:8px;">上传成功后，这里会自动出现你自己的凭证。</div>
                    </div>
                `;
                summary.textContent = totalCredentials > 0 ? '当前页没有记录' : '暂时还没有任何凭证记录';
                return;
            }

            summary.textContent = `共 ${totalCredentials} 条，当前显示第 ${currentPage + 1} 页`;
            container.innerHTML = credentials.map(cred => `
                <article class="credential-item">
                    <div class="credential-top">
                        <div>
                            <div class="credential-title">${cred.email || '未识别邮箱'}</div>
                            <span class="credential-note">类型：${cred.type || '-'} ｜ 状态以 CPA 校验结果为准</span>
                        </div>
                        <span class="badge badge-${statusClass(cred.status)}">${statusLabel(cred.status)}</span>
                    </div>
                    <div class="credential-meta">
                        <div class="meta-item">
                            <span class="meta-label">凭证 ID</span>
                            <div class="credential-value">${cred.id}</div>
                        </div>
                        <div class="meta-item">
                            <span class="meta-label">创建时间</span>
                            <div class="credential-value">${formatDate(cred.created_at)}</div>
                        </div>
                        <div class="meta-item">
                            <span class="meta-label">关联 CDK</span>
                            <div class="credential-value">${cred.cdk_id || '-'}</div>
                        </div>
                        <div class="meta-item">
                            <span class="meta-label">项目标识</span>
                            <div class="credential-value">${cred.project_id || '-'}</div>
                        </div>
                    </div>
                    <div class="credential-actions">
                        <button class="btn-danger" onclick="removeCredential(${cred.id}, this)">从本站列表移除</button>
                    </div>
                </article>
            `).join('');
        }

        function updatePagination() {
            const start = totalCredentials === 0 ? 0 : currentPage * pageSize + 1;
            const end = Math.min((currentPage + 1) * pageSize, totalCredentials);
            document.getElementById('paginationInfo').textContent = totalCredentials === 0
                ? '没有可显示的记录'
                : `显示 ${start}-${end} / ${totalCredentials}`;

            document.getElementById('prevBtn').disabled = currentPage === 0;
            document.getElementById('nextBtn').disabled = (currentPage + 1) * pageSize >= totalCredentials;
        }

        function changePage(direction) {
            currentPage += direction;
            if (currentPage < 0) currentPage = 0;
            loadCredentials();
        }

        async function removeCredential(id, button) {
            if (!confirm('确认从本站列表移除这条凭证吗？此操作不会删除 CPA 远端真实凭证。')) {
                return;
            }

            button.disabled = true;
            button.textContent = '移除中...';
            showMessage('', '');

            try {
                const response = await fetch(`/api/user/credentials/${id}`, { method: 'DELETE' });
                const result = await response.json();

                if (!response.ok) {
                    throw new Error(result.error || '移除失败');
                }

                showMessage('success', result.message || '已从本站列表移除');

                if (currentPage > 0 && totalCredentials % pageSize === 1) {
                    currentPage -= 1;
                }
                await loadCredentials();
            } catch (error) {
                showMessage('error', error.message || '移除失败');
                button.disabled = false;
                button.textContent = '从本站列表移除';
            }
        }

        async function logout() {
            try {
                await fetch('/api/user/logout', { method: 'POST' });
            } finally {
                window.location.href = '/';
            }
        }

        async function init() {
            setTheme(localStorage.getItem('site-theme') || 'light');
            await loadCurrentUser();
            await loadCredentials();
        }

        init().catch(error => {
            console.error('Failed to init page:', error);
        });
    </script>
</body>
</html>
